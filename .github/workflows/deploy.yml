name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build and audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run mobile UI audit
        run: npm run test:e2e:audit

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist
          if-no-files-found: error

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download production bundle
        uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Print deployment URL
        if: steps.deploy.outputs.deployment-url != ''
        run: echo "${{ steps.deploy.outputs.deployment-url }}"
