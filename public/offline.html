<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#172236" />
    <title>Roommate Match Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Sora", "Segoe UI", sans-serif;
        --ink: #172236;
        --muted: #476381;
        --line: rgba(23, 34, 54, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(240, 123, 90, 0.24), transparent 32%),
          radial-gradient(circle at 100% 10%, rgba(43, 133, 211, 0.18), transparent 28%),
          linear-gradient(135deg, #eff7ff 0%, #e9f8f2 52%, #fff6ed 100%);
      }

      main {
        width: min(460px, 100%);
        padding: 28px;
        border-radius: 28px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 48px rgba(15, 28, 48, 0.1);
      }

      h1 {
        margin: 0 0 12px;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        font-size: clamp(1.8rem, 8vw, 2.6rem);
        line-height: 1.02;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline.</h1>
      <p>The installed prototype can reopen cached screens, but live assets still need a connection the first time they load.</p>
    </main>
  </body>
</html>
